<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="M8HuQceILEx5zdb94RMr3zs2ryM5JZM0ZTLxS_cX1JQ" />
    
    <!-- Primary Meta Tags -->
    <title>{{TITLE}}</title>
    <meta name="title" content="{{TITLE}}" />
    <meta name="description" content="{{DESCRIPTION}}" />
    <meta name="keywords" content="{{KEYWORDS}}" />
    <meta name="robots" content="index,follow" />
    <meta name="author" content="Niduranga Jayarathna" />
    <link rel="canonical" href="{{URL}}" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{URL}}" />
    <meta property="og:title" content="{{TITLE}}" />
    <meta property="og:description" content="{{DESCRIPTION}}" />
    <meta property="og:image" content="https://njtools.xyz/og-image.png" />
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="{{URL}}" />
    <meta property="twitter:title" content="{{TITLE}}" />
    <meta property="twitter:description" content="{{DESCRIPTION}}" />
    <meta property="twitter:image" content="https://njtools.xyz/og-image.png" />

    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      (function(l) {
        var params = new URLSearchParams(l.search);
        var p = params.get('p');
        if (p) {
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + p + l.hash
          );
        }
      }(window.location))
    </script>
    <!-- End Single Page Apps for GitHub Pages -->

  </head>
  <body>
    <div id="root">
      <div id="seo-content-static" style="display: none;">
        {{SEO_CONTENT}}
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
